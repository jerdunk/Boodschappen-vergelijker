<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarkt Prijsvergelijker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            color: var(--gray-800);
            line-height: 1.6;
            min-height: 100vh;
        }

        .bg-shapes {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .bg-shapes span {
            position: absolute;
            display: block;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 25s linear infinite;
        }

        .bg-shapes span:nth-child(1) { left: 10%; width: 100px; height: 100px; animation-delay: 0s; }
        .bg-shapes span:nth-child(2) { left: 20%; width: 40px; height: 40px; animation-delay: 2s; animation-duration: 12s; }
        .bg-shapes span:nth-child(3) { left: 35%; width: 80px; height: 80px; animation-delay: 4s; }
        .bg-shapes span:nth-child(4) { left: 50%; width: 120px; height: 120px; animation-delay: 0s; animation-duration: 18s; }
        .bg-shapes span:nth-child(5) { left: 65%; width: 50px; height: 50px; animation-delay: 0s; }
        .bg-shapes span:nth-child(6) { left: 80%; width: 90px; height: 90px; animation-delay: 3s; animation-duration: 22s; }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            padding: 2rem 1rem 3rem;
            color: white;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px; height: 80px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            margin-bottom: 1.5rem;
            font-size: 2.5rem;
            box-shadow: var(--shadow-lg);
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 400px;
            margin: 0 auto;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-lg);
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-title i { color: var(--primary); }

        /* Product Input Form */
        .product-form {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .product-form input[type="text"] {
            flex: 2;
            min-width: 150px;
        }

        .product-form input[type="number"] {
            width: 80px;
        }

        .product-form select {
            width: 90px;
        }

        .product-form input,
        .product-form select {
            padding: 0.75rem 1rem;
            background: white;
            border: 2px solid transparent;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .product-form input:hover,
        .product-form select:hover {
            border-color: var(--gray-200);
        }

        .product-form input:focus,
        .product-form select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .product-form input::placeholder { color: var(--gray-400); }

        .btn-add {
            padding: 0.75rem 1.25rem;
            background: var(--success);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-add:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        /* Product List */
        .product-list-container {
            background: white;
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-bottom: 1.25rem;
        }

        .product-list-header {
            display: grid;
            grid-template-columns: 1fr 80px 90px 40px;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--gray-100);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .product-list-items {
            max-height: 300px;
            overflow-y: auto;
        }

        .product-list-item {
            display: grid;
            grid-template-columns: 1fr 80px 90px 40px;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            align-items: center;
            border-bottom: 1px solid var(--gray-100);
            transition: background 0.2s;
        }

        .product-list-item:last-child { border-bottom: none; }
        .product-list-item:hover { background: var(--gray-50); }

        .product-list-item .name {
            font-weight: 500;
            color: var(--gray-800);
        }

        .product-list-item .quantity,
        .product-list-item .unit {
            color: var(--gray-600);
            font-size: 0.9rem;
        }

        .btn-remove {
            width: 32px;
            height: 32px;
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-remove:hover {
            background: #fee2e2;
            color: var(--danger);
        }

        .empty-list {
            padding: 2rem;
            text-align: center;
            color: var(--gray-400);
        }

        .empty-list i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Action Buttons */
        .btn-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.875rem 1.75rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: all 0.25s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(99, 102, 241, 0.5);
        }

        .btn-secondary {
            background: white;
            color: var(--gray-700);
            box-shadow: var(--shadow);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--gray-50);
            transform: translateY(-1px);
        }

        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

        /* Loading & Stats */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: white;
        }

        .loading-spinner {
            width: 56px; height: 56px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 1.25rem;
            text-align: center;
        }

        .stat-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.75rem;
            color: white;
            font-size: 1.1rem;
        }

        .stat-card:nth-child(2) .stat-icon { background: linear-gradient(135deg, #34d399, #10b981); }
        .stat-card:nth-child(3) .stat-icon { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .stat-card:nth-child(4) .stat-icon { background: linear-gradient(135deg, #60a5fa, #3b82f6); }

        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--gray-800); }
        .stat-label { font-size: 0.75rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.25rem; }

        /* Results */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }

        .supermarket-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            animation: fadeInUp 0.4s ease forwards;
        }

        .supermarket-card:nth-child(1) { animation-delay: 0.05s; }
        .supermarket-card:nth-child(2) { animation-delay: 0.1s; }
        .supermarket-card:nth-child(3) { animation-delay: 0.15s; }
        .supermarket-card:nth-child(4) { animation-delay: 0.2s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .supermarket-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
        }

        .supermarket-card.cheapest {
            border-color: var(--success);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15), var(--shadow-lg);
        }

        .supermarket-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem;
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-100);
        }

        .cheapest .supermarket-header {
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
        }

        .supermarket-logo {
            width: 56px; height: 56px;
            border-radius: 14px;
            object-fit: contain;
            background: white;
            padding: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .supermarket-info { flex: 1; min-width: 0; }

        .supermarket-name {
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .supermarket-meta { font-size: 0.85rem; color: var(--gray-500); margin-top: 0.25rem; }

        .supermarket-price { text-align: right; }
        .price-amount { font-size: 1.75rem; font-weight: 700; color: var(--gray-800); line-height: 1; }
        .cheapest .price-amount { color: var(--success); }
        .price-label { font-size: 0.7rem; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.05em; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            background: var(--success);
            color: white;
        }

        .result-product-list {
            padding: 0.5rem;
            max-height: 320px;
            overflow-y: auto;
        }

        .result-product-list::-webkit-scrollbar { width: 6px; }
        .result-product-list::-webkit-scrollbar-track { background: var(--gray-100); border-radius: 3px; }
        .result-product-list::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

        .result-product-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0.875rem;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }

        .result-product-item:hover { background: var(--gray-50); }

        .result-product-name { flex: 1; min-width: 0; }
        .result-product-name a {
            color: var(--gray-800);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .result-product-name a:hover { color: var(--primary); }

        .result-product-details {
            font-size: 0.8rem;
            color: var(--gray-400);
            display: block;
            margin-top: 0.2rem;
        }

        .result-product-details .requested {
            color: var(--gray-500);
            font-weight: 500;
        }

        .result-product-details .found {
            color: var(--gray-400);
        }

        .result-product-details .normalized {
            color: var(--primary);
            font-weight: 500;
        }

        .result-product-price {
            text-align: right;
            margin-left: 1rem;
        }

        .result-product-price .price-normalized {
            font-weight: 700;
            color: var(--gray-800);
            font-size: 1rem;
        }

        .result-product-price .price-original {
            font-size: 0.75rem;
            color: var(--gray-400);
        }

        .result-product-price.estimate .price-normalized { color: var(--warning); }
        .product-not-found { color: var(--gray-400); font-style: italic; }

        .error-message {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 1.25rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        footer {
            text-align: center;
            padding: 3rem 1rem;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        footer a { color: white; text-decoration: none; font-weight: 500; }
        footer a:hover { opacity: 0.8; }
        footer .divider { margin: 0 0.75rem; opacity: 0.5; }

        @media (max-width: 640px) {
            .container { padding: 1rem; }
            header { padding: 1.5rem 1rem 2rem; }
            header h1 { font-size: 1.75rem; }
            .logo { width: 64px; height: 64px; font-size: 2rem; }
            .btn { flex: 1; min-width: 120px; }
            .results-grid { grid-template-columns: 1fr; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .product-form { flex-direction: column; }
            .product-form input[type="text"],
            .product-form input[type="number"],
            .product-form select { width: 100%; }
            .product-list-header { display: none; }
            .product-list-item {
                grid-template-columns: 1fr auto;
                grid-template-rows: auto auto;
            }
            .product-list-item .name { grid-column: 1; }
            .product-list-item .btn-remove { grid-column: 2; grid-row: 1 / 3; }
            .product-list-item .quantity,
            .product-list-item .unit { font-size: 0.85rem; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
    </div>

    <header>
        <div class="logo"><i class="fas fa-cart-shopping"></i></div>
        <h1>Prijsvergelijker</h1>
        <p>Vergelijk je boodschappen en bespaar bij de supermarkt</p>
    </header>

    <div class="container">
        <div class="card">
            <h2 class="card-title"><i class="fas fa-list-check"></i> Boodschappenlijst</h2>
            
            <!-- Add Product Form -->
            <div class="product-form">
                <input type="text" id="productName" placeholder="Productnaam (bijv. halfvolle melk)">
                <input type="number" id="productQuantity" placeholder="Aantal" min="0.1" step="0.1" value="1">
                <select id="productUnit">
                    <option value="stuks">stuks</option>
                    <option value="ml">ml</option>
                    <option value="L" selected>L</option>
                    <option value="g">g</option>
                    <option value="kg">kg</option>
                </select>
                <button class="btn-add" onclick="addProduct()">
                    <i class="fas fa-plus"></i> Toevoegen
                </button>
            </div>

            <!-- Product List -->
            <div class="product-list-container">
                <div class="product-list-header">
                    <span>Product</span>
                    <span>Aantal</span>
                    <span>Eenheid</span>
                    <span></span>
                </div>
                <div class="product-list-items" id="productList">
                    <div class="empty-list" id="emptyList">
                        <i class="fas fa-basket-shopping"></i>
                        <p>Voeg producten toe aan je lijst</p>
                    </div>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-primary" id="compareBtn" onclick="comparePrices()">
                    <i class="fas fa-magnifying-glass-dollar"></i> Vergelijk prijzen
                </button>
                <button class="btn btn-secondary" onclick="loadExample()">
                    <i class="fas fa-lightbulb"></i> Voorbeeld
                </button>
                <button class="btn btn-secondary" onclick="clearList()">
                    <i class="fas fa-xmark"></i> Wissen
                </button>
            </div>
        </div>

        <div id="errorMessage" class="error-message hidden">
            <i class="fas fa-circle-exclamation"></i>
            <span id="errorText"></span>
        </div>

        <div id="loading" class="loading hidden">
            <div class="loading-spinner"></div>
            <p>Prijzen ophalen en normaliseren...</p>
        </div>

        <div id="statsBar" class="stats-bar hidden">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-box"></i></div>
                <div class="stat-value" id="statProducts">0</div>
                <div class="stat-label">Producten</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-store"></i></div>
                <div class="stat-value" id="statStores">0</div>
                <div class="stat-label">Supermarkten</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-piggy-bank"></i></div>
                <div class="stat-value" id="statSavings">€0</div>
                <div class="stat-label">Max. besparing</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-calendar"></i></div>
                <div class="stat-value" id="statDate">-</div>
                <div class="stat-label">Bijgewerkt</div>
            </div>
        </div>

        <div id="results" class="results-grid"></div>
    </div>

    <footer>
        <a href="https://www.checkjebon.nl/" target="_blank">Checkjebon.nl</a>
        <span class="divider">•</span>
        <a href="https://github.com/supermarkt/checkjebon" target="_blank">Open Source</a>
        <span class="divider">•</span>
        MIT Licentie
    </footer>

    <script src="https://supermarkt.github.io/checkjebon-js/checkjebon.js"></script>
    <script>
        // Shopping list data
        let shoppingList = [];

        // DOM Elements
        const productNameInput = document.getElementById('productName');
        const productQuantityInput = document.getElementById('productQuantity');
        const productUnitSelect = document.getElementById('productUnit');
        const productListEl = document.getElementById('productList');
        const emptyListEl = document.getElementById('emptyList');
        const compareBtn = document.getElementById('compareBtn');
        const loadingEl = document.getElementById('loading');
        const resultsEl = document.getElementById('results');
        const statsBar = document.getElementById('statsBar');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        // Load saved list on page load
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('shoppingListV2');
            if (saved) {
                shoppingList = JSON.parse(saved);
                renderProductList();
            }
        });

        // Save list to localStorage
        function saveList() {
            localStorage.setItem('shoppingListV2', JSON.stringify(shoppingList));
        }

        // Add product to list
        function addProduct() {
            const name = productNameInput.value.trim();
            const quantity = parseFloat(productQuantityInput.value);
            const unit = productUnitSelect.value;

            if (!name) {
                showError('Vul een productnaam in.');
                return;
            }

            if (!quantity || quantity <= 0) {
                showError('Vul een geldige hoeveelheid in.');
                return;
            }

            shoppingList.push({
                id: Date.now(),
                name,
                quantity,
                unit
            });

            saveList();
            renderProductList();

            // Clear inputs
            productNameInput.value = '';
            productQuantityInput.value = '1';
            productNameInput.focus();
            errorMessage.classList.add('hidden');
        }

        // Remove product from list
        function removeProduct(id) {
            shoppingList = shoppingList.filter(p => p.id !== id);
            saveList();
            renderProductList();
        }

        // Render product list
        function renderProductList() {
            if (shoppingList.length === 0) {
                emptyListEl.classList.remove('hidden');
                productListEl.innerHTML = '';
                productListEl.appendChild(emptyListEl);
                return;
            }

            emptyListEl.classList.add('hidden');
            productListEl.innerHTML = shoppingList.map(p => `
                <div class="product-list-item">
                    <span class="name">${escapeHtml(p.name)}</span>
                    <span class="quantity">${p.quantity}</span>
                    <span class="unit">${p.unit}</span>
                    <button class="btn-remove" onclick="removeProduct(${p.id})" title="Verwijderen">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        // Load example products
        function loadExample() {
            shoppingList = [
                { id: 1, name: 'halfvolle melk', quantity: 1, unit: 'L' },
                { id: 2, name: 'volkoren brood', quantity: 1, unit: 'stuks' },
                { id: 3, name: 'roomboter', quantity: 250, unit: 'g' },
                { id: 4, name: 'eieren', quantity: 6, unit: 'stuks' },
                { id: 5, name: 'bananen', quantity: 1, unit: 'kg' },
                { id: 6, name: 'pindakaas', quantity: 350, unit: 'g' },
                { id: 7, name: 'hagelslag', quantity: 400, unit: 'g' },
                { id: 8, name: 'jong belegen kaas', quantity: 500, unit: 'g' },
                { id: 9, name: 'yoghurt', quantity: 500, unit: 'ml' },
                { id: 10, name: 'cola', quantity: 1.5, unit: 'L' }
            ];
            saveList();
            renderProductList();
        }

        // Clear list
        function clearList() {
            shoppingList = [];
            saveList();
            renderProductList();
            resultsEl.innerHTML = '';
            statsBar.classList.add('hidden');
            errorMessage.classList.add('hidden');
        }

        // Utility functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatPrice(price) {
            if (price === null || price === undefined) return '-';
            return new Intl.NumberFormat('nl-NL', { style: 'currency', currency: 'EUR' }).format(price);
        }

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
        }

        // Parse amount string from API response (e.g., "1,5 liter", "250 gram", "6 stuks")
        function parseAmount(amountStr) {
            if (!amountStr) return null;

            const str = amountStr.toLowerCase().trim();
            
            // Common patterns
            const patterns = [
                // "1,5 liter" or "1.5 l" or "1500 ml"
                { regex: /(\d+[,.]?\d*)\s*(liter|l)\b/i, unit: 'L', multiplier: 1 },
                { regex: /(\d+[,.]?\d*)\s*(ml|milliliter)\b/i, unit: 'ml', multiplier: 1 },
                { regex: /(\d+[,.]?\d*)\s*(cl|centiliter)\b/i, unit: 'ml', multiplier: 10 },
                
                // "250 gram" or "1 kg"
                { regex: /(\d+[,.]?\d*)\s*(kilogram|kilo|kg)\b/i, unit: 'kg', multiplier: 1 },
                { regex: /(\d+[,.]?\d*)\s*(gram|gr|g)\b/i, unit: 'g', multiplier: 1 },
                
                // "6 stuks" or "x6" or "6x"
                { regex: /(\d+)\s*(stuks?|st)\b/i, unit: 'stuks', multiplier: 1 },
                { regex: /[x×](\d+)/i, unit: 'stuks', multiplier: 1 },
                { regex: /(\d+)[x×]/i, unit: 'stuks', multiplier: 1 },
            ];

            for (const pattern of patterns) {
                const match = str.match(pattern.regex);
                if (match) {
                    const value = parseFloat(match[1].replace(',', '.')) * pattern.multiplier;
                    return { value, unit: pattern.unit };
                }
            }

            return null;
        }

        // Normalize units to base units (ml for volume, g for weight)
        function normalizeToBase(value, unit) {
            switch (unit.toLowerCase()) {
                case 'l':
                case 'liter':
                    return { value: value * 1000, baseUnit: 'ml' };
                case 'ml':
                case 'milliliter':
                    return { value, baseUnit: 'ml' };
                case 'kg':
                case 'kilo':
                case 'kilogram':
                    return { value: value * 1000, baseUnit: 'g' };
                case 'g':
                case 'gram':
                    return { value, baseUnit: 'g' };
                case 'stuks':
                case 'stuk':
                default:
                    return { value, baseUnit: 'stuks' };
            }
        }

        // Format quantity with unit nicely
        function formatQuantity(value, unit) {
            // Convert to nicer units if appropriate
            if (unit === 'ml' && value >= 1000) {
                return `${(value / 1000).toFixed(1).replace('.0', '')} L`;
            }
            if (unit === 'g' && value >= 1000) {
                return `${(value / 1000).toFixed(2).replace(/\.?0+$/, '')} kg`;
            }
            return `${value} ${unit}`;
        }

        // Calculate normalized price
        function calculateNormalizedPrice(originalPrice, foundAmount, requestedQuantity, requestedUnit) {
            if (!originalPrice || originalPrice === 0) return null;

            const requested = normalizeToBase(requestedQuantity, requestedUnit);
            
            if (!foundAmount) {
                // No amount info, assume it's 1 unit
                return {
                    normalizedPrice: originalPrice,
                    pricePerUnit: originalPrice,
                    foundQuantity: 1,
                    foundUnit: requestedUnit,
                    isExact: false
                };
            }

            const found = normalizeToBase(foundAmount.value, foundAmount.unit);

            // Check if units are compatible
            if (found.baseUnit !== requested.baseUnit) {
                // Incompatible units, can't normalize
                return {
                    normalizedPrice: originalPrice,
                    pricePerUnit: null,
                    foundQuantity: foundAmount.value,
                    foundUnit: foundAmount.unit,
                    isExact: false,
                    incompatible: true
                };
            }

            // Calculate price per base unit
            const pricePerBaseUnit = originalPrice / found.value;
            
            // Calculate price for requested quantity
            const normalizedPrice = pricePerBaseUnit * requested.value;

            return {
                normalizedPrice: Math.round(normalizedPrice * 100) / 100,
                pricePerUnit: pricePerBaseUnit,
                foundQuantity: foundAmount.value,
                foundUnit: foundAmount.unit,
                isExact: Math.abs(found.value - requested.value) < 0.01
            };
        }

        // Compare prices
        async function comparePrices() {
            if (shoppingList.length === 0) {
                showError('Voeg eerst producten toe aan je lijst.');
                return;
            }

            errorMessage.classList.add('hidden');
            loadingEl.classList.remove('hidden');
            resultsEl.innerHTML = '';
            statsBar.classList.add('hidden');
            compareBtn.disabled = true;

            try {
                if (typeof getPricesForProducts !== 'function') {
                    throw new Error('Checkjebon library niet geladen.');
                }

                // Build search queries
                const searchQueries = shoppingList.map(p => {
                    // Include quantity in search for better matching
                    if (p.unit === 'stuks') {
                        return `${p.quantity} ${p.name}`;
                    } else {
                        return `${p.quantity} ${p.unit} ${p.name}`;
                    }
                });

                // Fetch prices
                let supermarkets = await getPricesForProducts(searchQueries);

                // Filter supermarkets
                const allowedCodes = ['jumbo', 'ah', 'plus', 'lidl'];
                supermarkets = supermarkets.filter(s => allowedCodes.includes(s.code.toLowerCase()));

                // Process and normalize prices
                const processedSupermarkets = supermarkets.map(sm => {
                    const processedProducts = sm.products.map((product, index) => {
                        const requestedProduct = shoppingList[index];
                        const foundAmount = parseAmount(product.amount) || parseAmount(product.name);
                        
                        const priceInfo = calculateNormalizedPrice(
                            product.price,
                            foundAmount,
                            requestedProduct.quantity,
                            requestedProduct.unit
                        );

                        return {
                            ...product,
                            requested: requestedProduct,
                            foundAmount,
                            priceInfo,
                            normalizedPrice: priceInfo?.normalizedPrice || product.price || 0
                        };
                    });

                    const totalNormalizedPrice = processedProducts.reduce(
                        (sum, p) => sum + (p.normalizedPrice || 0), 0
                    );

                    return {
                        ...sm,
                        products: processedProducts,
                        totalNormalizedPrice,
                        foundCount: processedProducts.filter(p => p.name && !p.isEstimate).length,
                        estimateCount: processedProducts.filter(p => p.isEstimate).length,
                        notFoundCount: processedProducts.filter(p => !p.name).length
                    };
                });

                // Sort by normalized total price
                processedSupermarkets.sort((a, b) => a.totalNormalizedPrice - b.totalNormalizedPrice);

                const cheapest = processedSupermarkets[0]?.totalNormalizedPrice || 0;
                const mostExpensive = processedSupermarkets[processedSupermarkets.length - 1]?.totalNormalizedPrice || 0;

                // Update stats
                document.getElementById('statProducts').textContent = shoppingList.length;
                document.getElementById('statStores').textContent = processedSupermarkets.length;
                document.getElementById('statSavings').textContent = formatPrice(mostExpensive - cheapest);

                const lastUpdate = typeof pricesLastUpdated === 'function' ? pricesLastUpdated() : null;
                document.getElementById('statDate').textContent = lastUpdate
                    ? lastUpdate.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' })
                    : '-';

                statsBar.classList.remove('hidden');

                // Render results
                resultsEl.innerHTML = processedSupermarkets.map((sm, i) => `
                    <div class="supermarket-card ${i === 0 ? 'cheapest' : ''}">
                        <div class="supermarket-header">
                            ${sm.icon
                                ? `<img src="${sm.icon}" alt="${sm.name}" class="supermarket-logo">`
                                : `<div class="supermarket-logo" style="display:flex;align-items:center;justify-content:center;background:var(--gray-100);font-weight:bold;font-size:1.25rem;color:var(--gray-600);">${sm.name.charAt(0)}</div>`}
                            <div class="supermarket-info">
                                <div class="supermarket-name">
                                    ${sm.name}
                                    ${i === 0 ? '<span class="badge"><i class="fas fa-trophy"></i> Goedkoopst</span>' : ''}
                                </div>
                                <div class="supermarket-meta">
                                    ${sm.foundCount} gevonden${sm.estimateCount > 0 ? ` · ${sm.estimateCount} geschat` : ''}${sm.notFoundCount > 0 ? ` · ${sm.notFoundCount} niet gevonden` : ''}
                                </div>
                            </div>
                            <div class="supermarket-price">
                                <div class="price-amount">${formatPrice(sm.totalNormalizedPrice)}</div>
                                <div class="price-label">Totaal</div>
                            </div>
                        </div>
                        <div class="result-product-list">
                            ${sm.products.map(p => {
                                const req = p.requested;
                                const info = p.priceInfo;
                                
                                return `
                                <div class="result-product-item">
                                    <div class="result-product-name">
                                        ${p.name
                                            ? (p.link ? `<a href="${p.link}" target="_blank">${p.name}</a>` : `<span>${p.name}</span>`)
                                            : '<span class="product-not-found">Niet gevonden</span>'}
                                        <span class="result-product-details">
                                            <span class="requested">${req.quantity} ${req.unit} ${req.name}</span>
                                            ${info && !info.isExact && info.foundQuantity ? 
                                                ` → <span class="found">${info.foundQuantity} ${info.foundUnit}</span>` : ''}
                                            ${info && !info.isExact && !info.incompatible ? 
                                                ` <span class="normalized">(omgerekend)</span>` : ''}
                                            ${info && info.incompatible ? 
                                                ` <span class="normalized">(andere eenheid)</span>` : ''}
                                        </span>
                                    </div>
                                    <div class="result-product-price ${p.isEstimate ? 'estimate' : ''}">
                                        <div class="price-normalized">
                                            ${formatPrice(p.normalizedPrice)}
                                            ${p.isEstimate ? '<i class="fas fa-circle-question" title="Geschatte prijs"></i>' : ''}
                                        </div>
                                        ${info && !info.isExact && p.price ? 
                                            `<div class="price-original">origineel: ${formatPrice(p.price)}</div>` : ''}
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error(error);
                showError(`Er ging iets mis: ${error.message}`);
            } finally {
                loadingEl.classList.add('hidden');
                compareBtn.disabled = false;
            }
        }

        // Enter key adds product
        productNameInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') addProduct();
        });

        productQuantityInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') addProduct();
        });
    </script>
</body>
